<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">今日ノート マスカブルアイコン</title>
  <desc id="desc">切り抜きに対応した空色の背景、中央の白いノート、大きな青いチェックマーク</desc>
  <defs>
    <linearGradient id="sky" x1="52" y1="28" x2="468" y2="488" gradientUnits="userSpaceOnUse">
      <stop stop-color="#BDEAFF"/>
      <stop offset=".48" stop-color="#78C3EC"/>
      <stop offset="1" stop-color="#3788C3"/>
    </linearGradient>
    <radialGradient id="light" cx="0" cy="0" r="1" gradientTransform="translate(106 72) rotate(48) scale(340)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity=".32"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="check" x1="211" y1="255" x2="337" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2E91D0"/>
      <stop offset="1" stop-color="#125684"/>
    </linearGradient>
    <filter id="shadow" x="88" y="72" width="346" height="386" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="13" stdDeviation="12" flood-color="#164E75" flood-opacity=".20"/>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#sky)"/>
  <rect width="512" height="512" fill="url(#light)"/>
  <circle cx="474" cy="454" r="132" fill="#17689F" opacity=".08"/>

  <g filter="url(#shadow)">
    <rect x="139" y="108" width="234" height="296" rx="47" fill="#FFFFFF"/>
    <path d="M186 108H191V404H186C160 404 139 383 139 357V155C139 129 160 108 186 108Z" fill="#E8F7FE"/>
    <path d="M191 108V404" stroke="#CAEAF9" stroke-width="4"/>

    <path d="M125 176H158M125 228H158M125 280H158M125 332H158" stroke="#216B9D" stroke-width="15" stroke-linecap="round"/>

    <path d="M221 184H315M221 226H284" stroke="#A7D5EC" stroke-width="16" stroke-linecap="round"/>

    <path d="M209 292L251 334L330 240" fill="none" stroke="#FFFFFF" stroke-width="44" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M209 292L251 334L330 240" fill="none" stroke="url(#check)" stroke-width="29" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
